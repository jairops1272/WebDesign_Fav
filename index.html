<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBFORM - Contáctanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-transparent pt-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-file-lines text-primary me-2"></i>WEBFORM</a>
            <div class="ms-auto">
                <ul class="navbar-nav d-flex flex-row gap-4">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="form-card text-center p-5">
            <h2 class="fw-bold mb-1">Contáctanos y Regístrate</h2>
            <p class="text-muted mb-4">Déjanos tus datos y nos comunicaremos contigo pronto.</p>

            <form>
                <div class="row g-3">
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Ej. Ana Pérez García">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" placeholder="correo@ejemplo.com">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Número de Teléfono</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><img src="https://flagcdn.com/w20/mx.png" width="20" alt="MX" class="me-1"> +52</span>
                            <input type="tel" class="form-control border-start-0" placeholder="55 1234 5678">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Asunto</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-comment-dots text-muted"></i></span>
                            <select class="form-select border-start-0">
                                <option selected disabled>Selecciona el motivo del contacto</option>
                                <option value="1">Información</option>
                                <option value="2">Soporte</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 text-start">
                        <label class="form-label fw-semibold">Mensaje</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 align-items-start pt-2"><i class="fa-solid fa-pen text-muted"></i></span>
                            <textarea class="form-control border-start-0" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn submit-button mt-4 px-5 py-2">
                    Enviar Información <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>

                <p class="mt-3 small text-muted">Tus datos están seguros con nosotros. <a href="#" class="text-decoration-underline">Ver Aviso de Privacidad</a>.</p>
            </form>
        </div>
    </main>

</body>
</html>
